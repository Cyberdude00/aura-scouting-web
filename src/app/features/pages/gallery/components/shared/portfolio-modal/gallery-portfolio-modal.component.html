@if (model) {
  <section class="portfolio-modal gallery-overlay overlay-shell overlay-shell--light ui-fade-in" (click)="closeModal()">
    <div class="portfolio-panel overlay-panel overlay-scroll-panel ui-rise-in" (click)="$event.stopPropagation()">
      <button class="close-btn overlay-close-btn gallery-round-btn" type="button" (click)="closeModal()" aria-label="Close">&times;</button>

      <div class="portfolio-header">
        <h2 class="section-title-accent">{{ model.name }}</h2>
        <app-gallery-measurement-system [model]="model"></app-gallery-measurement-system>
      </div>

      @if (model.portfolio.length) {
        <div class="portfolio-grid">
          @for (media of model.portfolio; track trackByPortfolioItem($index, media); let i = $index) {
            <div
              class="portfolio-item gallery-media-card"
              (click)="openMedia(i)"
              (keydown.enter)="openMedia(i)"
              tabindex="0"
              role="button"
              [attr.aria-label]="'Open media ' + (i + 1)"
            >
              @if (isVideo(media)) {
                <video class="gallery-media-cover" [src]="media" muted playsinline preload="metadata"></video>
              } @else {
                <img class="gallery-media-cover" [src]="media" [alt]="model.name + ' portfolio'" loading="lazy">
                <button
                  type="button"
                  class="download-btn gallery-download-btn ui-smooth-transition"
                  (click)="downloadMedia($event, media, i)"
                  aria-label="Download photo"
                  title="Download photo"
                >
                  ⬇
                </button>
              }
            </div>
          }
        </div>
      }
    </div>
  </section>
}
