@if (mediaPath) {
  <section class="media-viewer gallery-overlay overlay-shell overlay-shell--dark ui-fade-in" (click)="closeViewer()">
    <div class="viewer-content" (click)="$event.stopPropagation()" (touchstart)="onTouchStart($event)" (touchend)="onTouchEnd($event)">
      <button class="viewer-close overlay-close-btn gallery-round-btn" type="button" (click)="closeViewer()" aria-label="Close">&times;</button>
      <button class="viewer-nav overlay-nav-btn viewer-prev gallery-round-btn" type="button" (click)="showPrevious()" aria-label="Previous">&#10094;</button>

      <div class="viewer-media-wrap">
        @if (isVideo(mediaPath)) {
          <video [src]="mediaPath" controls playsinline autoplay></video>
        } @else {
          <img [src]="mediaPath" alt="Large media view" loading="eager">
        }

        @if (canDownloadImage) {
          <button
            type="button"
            class="viewer-download gallery-download-btn ui-smooth-transition"
            (click)="downloadCurrentMedia($event)"
            aria-label="Download photo"
            title="Download photo"
          >
            ⬇
          </button>
        }
      </div>

      <button class="viewer-nav overlay-nav-btn viewer-next gallery-round-btn" type="button" (click)="showNext()" aria-label="Next">&#10095;</button>
    </div>
  </section>
}
