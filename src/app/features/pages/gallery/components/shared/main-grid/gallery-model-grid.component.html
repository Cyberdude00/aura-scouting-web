<main class="grid">
  @for (model of models; track trackByModelId($index, model)) {
    <article
      class="card gallery-media-card"
      (click)="openModel(model)"
      (keydown.enter)="openModel(model)"
      tabindex="0"
      role="button"
      [attr.aria-label]="'Open portfolio for ' + model.name"
    >
      <div class="media-wrap">
        <img
          class="gallery-media-cover"
          [src]="resolveCover(model)"
          [alt]="model.name"
          loading="lazy"
          (error)="onCoverError($event, model)"
        >
        @if (model.ongoingTrip) {
          <div class="badge">Ongoing Trip</div>
        }
      </div>
      <div class="card-body">
        <h2>{{ model.name }}</h2>
      </div>
    </article>
  }
</main>
