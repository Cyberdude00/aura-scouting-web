<section id="model-submission">
  <h2>Model Submission</h2>

  <div class="contact-form-wrapper">
    <form id="emailForm" novalidate (ngSubmit)="onSubmit(contactForm)" #contactForm="ngForm">
      <div class="picture-to-upload" [class.previewing]="isPreviewing">
        <input id="image_attachment" class="file-input" type="file" name="image_attachment" accept="image/*"
          (change)="onFileSelected($event)">

        <img [src]="imagePreviewSrc" id="img-preview" class="img-preview" alt="Preview" [style.display]="'block'" />

        <div class="upload-main-text" *ngIf="!isPreviewing">
        </div>
      </div>

      <p class="text-xs text-gray-500 mt-1" style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">
        Upload a selfie of yourself (max 10 MB).
      </p>

      <input type="text" name="name" placeholder="Name" class="text unified-text-field" required [(ngModel)]="formData.name" appTypingPlaceholder="Name">
      <input type="text" name="age" placeholder="Age" class="text unified-text-field" required [(ngModel)]="formData.age" appTypingPlaceholder="Age">
      <input type="email" name="email" placeholder="Email" class="text unified-text-field" required [(ngModel)]="formData.email" appTypingPlaceholder="Email">
      <input type="text" name="height" placeholder="Height (cm)" class="text unified-text-field" required [(ngModel)]="formData.height" appTypingPlaceholder="Height (cm)">
      <input type="text" name="social_network" placeholder="Social Network" class="text unified-text-field" maxlength="150" required [(ngModel)]="formData.social_network" appTypingPlaceholder="Social Network">
      <input type="text" name="location" placeholder="Location" class="text unified-text-field" required [(ngModel)]="formData.location" appTypingPlaceholder="Location">
      <textarea name="about_me" placeholder="About me" class="text unified-text-field" minlength="10" maxlength="1000" required [(ngModel)]="formData.about_me" appTypingPlaceholder="About me"></textarea>

      <p *ngIf="successMessage" class="text-xs text-gray-500 mt-1" style="font-size: 0.8rem; color: #2d7a39; margin-bottom: 10px;">
        {{ successMessage }}
      </p>

      <p *ngIf="errorMessage" class="text-xs text-gray-500 mt-1" style="font-size: 0.8rem; color: #b02a37; margin-bottom: 10px;">
        {{ errorMessage }}
      </p>

      <button type="submit" id="submitButton" class="btn-outline-accent" [disabled]="isSubmitting || contactForm.invalid">
        <span id="buttonText">{{ isSubmitting ? 'Sending...' : 'SUBMIT' }}</span>
        <div id="loadingSpinner" class="spinner" [class.hidden]="!isSubmitting"></div>
      </button>
    </form>
  </div>
</section>
